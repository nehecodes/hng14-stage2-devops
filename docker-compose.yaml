services:
  api:
    build: ./api/
    ports:
      - "8000:8000"
    environment: 
    - REDIS_HOST=${REDIS_HOST}
    - REDIS_PORT=${REDIS_PORT}
    secrets:
     - redis_password
    networks:
      - hng-net
    depends_on:
      redis:
        condition: service_started
  redis:
    image: redis:7
    secrets:
      - redis_password
    networks:
      - hng-net
    restart: always
    command: >
      sh -c "
        redis-server --requirepass $(cat /run/secrets/redis_password)
      "
  frontend:
    build: ./frontend/
    ports:
      - "3000:3000"
    networks:
      - hng-net
  worker:
    build: ./worker/
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    secrets:
      - redis_password
    networks:
      - hng-net
networks:
  hng-net:
    driver: bridge
secrets:
  redis_password:
    file: ./secrets/redis_password   