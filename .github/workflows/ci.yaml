name: CI Pipeline
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
env:
  REGISTRY: localhost:5000
  SHA: ${{ github.sha }}
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8
       
      - name: Lint Python
        run: flake8 ./api ./worker --max-line-length=88
      
      - name: Set up node 
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint Javascript
        working-directory: frontend
        run: npx eslint . --ext .js

      - name: Install hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
          -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
      - name: Lint Dockerfile
        run: |
          hadolint api/Dockerfile
          hadolint frontend/Dockerfile
          hadolint worker/Dockerfile

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install uv
        run: pip install uv

      - name: Install API deps and pytest
        working-directory: api
        run: uv sync

      - name: Run unit test with coverage
        working-directory: api
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: dummy-secret
        run: |
          uv run pytest tests/ \
          --cov=. \
          --cov-report=xml:coverage.xml \
          --cov-report=html:coverage-html \
          -v
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            api/coverage.xml
            api/coverage-html/

  build:
    name: Build and Push images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.SHA }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ env.SHA }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.SHA }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull images from local registry
        run: |
          docker pull ${{ env.REGISTRY }}/api:${{ env.SHA }}
          docker pull ${{ env.REGISTRY }}/worker:${{ env.SHA }}
          docker pull ${{ env.REGISTRY }}/frontend:${{ env.SHA }}

      - name: Install Trivy
        run: |
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
 
      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            ${{ env.REGISTRY }}/api:${{ env.SHA }}
 
      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            ${{ env.REGISTRY }}/worker:${{ env.SHA }}
 
      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            ${{ env.REGISTRY }}/frontend:${{ env.SHA }}
 
      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: "*.sarif"

      - name: Pull Images from registry
        run: |
          docker pull ${{ env.REGISTRY }}/api:${{ env.SHA }}
          docker pull ${{ env.REGISTRY }}/worker:${{ env.SHA }}
          docker pull ${{ env.REGISTRY }}/frontend:${{ env.SHA }}

      - name: Tag images for compose
        run: |
          docker tag ${{ env.REGISTRY }}/api:${{ env.SHA }} api:test
          docker tag ${{ env.REGISTRY }}/worker:${{ env.SHA }} worker:test
          docker tag ${{ env.REGISTRY }}/frontend:${{ env.SHA }} frontend:test
      
      - name: Write redis secret
        run: |
          mkdir -p secrets
          echo "test-redis-secret" > secrets/redis_password
 
      - name: Stand up the full stack
        env:
          REDIS_HOST: redis
          REDIS_PORT: 6379
        run: |
          docker compose \
            -f docker-compose.yaml \
            -f docker-compose.test.yaml \
            up -d --no-build
      - name: Wait for API health check
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 2s"
            sleep 2
          done
          echo "API never became healthy"
          exit 1
 
      - name: Wait for Frontend health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend never became healthy"
          exit 1
 
      - name: Run integration test — submit job and poll for completion
        run: |
          # Submit a job via the frontend/API
          JOB_ID=$(curl -sf -X POST http://localhost:8000/jobs \
            -H "Content-Type: application/json" \
            -d '{"task": "integration-test"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
 
          echo "Submitted job ID: $JOB_ID"

          # Poll until status is 'completed' or timeout after 60s
          DEADLINE=$(( $(date +%s) + 60 ))
          while [ $(date +%s) -lt $DEADLINE ]; do
            STATUS=$(curl -sf http://localhost:8000/jobs/$JOB_ID \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Job status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            if [ "$STATUS" = "failed" ]; then
              echo "❌ Job failed"
              exit 1
            fi
            sleep 3
          done
 
          echo "Timed out waiting for job to complete"
          exit 1
 
      - name: Tear down stack (always)
        if: always()
        run: docker compose down -v --remove-orphans
  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write redis secret
        run: |
          mkdir -p /opt/app/secrets
          echo "${{ secrets.REDIS_PASSWORD }}" > /opt/app/secrets/redis_password

      - name: Rolling update — API
        env:
          SHA: ${{ github.sha }}
          REGISTRY: ${{ secrets.DEPLOY_REGISTRY }}
        run: |
          # Pull new image
          docker pull $REGISTRY/api:$SHA

          # Start canary alongside the live container
          docker run -d \
            --name api-canary \
            --network hng-net \
            --env-file /opt/app/.env \
            --secret redis_password \
            $REGISTRY/api:$SHA

          # Health check loop — max 60s
          DEADLINE=$(( $(date +%s) + 60 ))
          HEALTHY=false
          while [ $(date +%s) -lt $DEADLINE ]; do
            if docker exec api-canary curl -sf http://127.0.0.1:8000/health; then
              HEALTHY=true
              break
            fi
            sleep 3
          done

          # Abort and leave old container running if canary never passed
          if [ "$HEALTHY" != "true" ]; then
            echo "Canary failed — removing it, old container untouched"
            docker rm -f api-canary
            exit 1
          fi

          # Swap
          docker rm -f api
          docker rename api-canary api

      - name: Rolling update — Worker
        env:
          SHA: ${{ github.sha }}
          REGISTRY: ${{ secrets.DEPLOY_REGISTRY }}
        run: |
          docker pull $REGISTRY/worker:$SHA

          docker run -d \
            --name worker-canary \
            --network hng-net \
            --env-file /opt/app/.env \
            --secret redis_password \
            $REGISTRY/worker:$SHA

          DEADLINE=$(( $(date +%s) + 60 ))
          HEALTHY=false
          while [ $(date +%s) -lt $DEADLINE ]; do
            if docker exec worker-canary pgrep -x python3 > /dev/null; then
              HEALTHY=true
              break
            fi
            sleep 3
          done

          if [ "$HEALTHY" != "true" ]; then
            docker rm -f worker-canary
            exit 1
          fi

          docker rm -f worker
          docker rename worker-canary worker

      - name: Rolling update — Frontend
        env:
          SHA: ${{ github.sha }}
          REGISTRY: ${{ secrets.DEPLOY_REGISTRY }}
        run: |
          docker pull $REGISTRY/frontend:$SHA

          docker run -d \
            --name frontend-canary \
            --network hng-net \
            -p 3001:3000 \
            $REGISTRY/frontend:$SHA

          DEADLINE=$(( $(date +%s) + 60 ))
          HEALTHY=false
          while [ $(date +%s) -lt $DEADLINE ]; do
            if curl -sf http://127.0.0.1:3001; then
              HEALTHY=true
              break
            fi
            sleep 3
          done

          if [ "$HEALTHY" != "true" ]; then
            docker rm -f frontend-canary
            exit 1
          fi

          # Stop old, re-run canary on the real port
          docker rm -f frontend
          docker run -d \
            --name frontend \
            --network hng-net \
            -p 3000:3000 \
            $REGISTRY/frontend:$SHA
          docker rm -f frontend-canary

      - name: Prune old images
        run: docker image prune -f --filter "until=24h"